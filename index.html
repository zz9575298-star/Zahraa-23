<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zahraa Maitham</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #bba88b 0%, #9a8268 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', 'Times New Roman', serif;
            padding: 20px;
        }

        .scene {
            position: relative;
            width: 1100px;
            max-width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-end;
            gap: 30px;
        }

        .book-container {
            perspective: 3500px;
            width: 500px;
            height: 370px;
            position: relative;
            filter: drop-shadow(0 30px 25px #2a1e14);
        }

        .book {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(4deg) rotateY(-15deg);
        }

        .cover {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #3b2b1d, #1f150e);
            border-radius: 0 18px 18px 0;
            box-shadow: inset -2px 0 8px #ab8e6a, 8px 8px 25px #00000055;
            transform: translateZ(18px);
            border-left: 4px solid #ba9f80;
        }

        .cover-spine {
            position: absolute;
            left: -18px;
            width: 18px;
            height: 100%;
            background: linear-gradient(to right, #2f2218, #1c130e);
            border-radius: 4px 0 0 4px;
            box-shadow: inset -2px 0 5px #5e4a35;
        }

        .pages {
            position: absolute;
            top: 5px;
            left: 5px;
            right: -10px;
            bottom: 5px;
            background: #fefcf5;
            border-radius: 0 12px 12px 0;
            box-shadow: inset 0 0 20px #c9b59b, 4px 4px 12px #00000033;
            transform: translateZ(5px);
            overflow: hidden;
        }

        .pages::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 20px;
            right: 20px;
            bottom: 15px;
            background: repeating-linear-gradient(#e4d6c4 0px, #e4d6c4 2px, transparent 2px, transparent 28px);
            opacity: 0.35;
            pointer-events: none;
        }

        .page-edge {
            position: absolute;
            top: 8px;
            right: -10px;
            width: 25px;
            height: calc(100% - 16px);
            background: linear-gradient(to left, #e9dbc9, #cfbea8);
            border-radius: 0 4px 4px 0;
            transform: rotateY(-2deg) translateZ(2px);
            box-shadow: -4px 0 8px #00000022;
        }

        .page-shadow {
            position: absolute;
            bottom: -10px;
            left: 20px;
            right: 20px;
            height: 30px;
            background: radial-gradient(ellipse at 50% 0%, #00000055 0%, transparent 80%);
            filter: blur(6px);
            z-index: -1;
        }

        .coffee-container {
            width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            filter: drop-shadow(0 20px 18px #2a1e14);
        }

        .cup {
            position: relative;
            width: 240px;
            height: 220px;
        }

        .cup-body {
            position: absolute;
            bottom: 15px;left: 25px;
            width: 180px;
            height: 140px;
            background: radial-gradient(circle at 30% 20%, #fdf1e0, #dac1a5);
            border-radius: 0 0 90px 90px / 0 0 50px 50px;
            border: 8px solid #856f54;
            border-top: none;
            box-shadow: inset 0 -15px 25px #9f8468, 20px 20px 25px #00000033;
            overflow: hidden;
        }

        .cup-body::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 15px;
            width: 100px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #ffffff80, transparent 70%);
            border-radius: 50%;
        }

        .cup-handle {
            position: absolute;
            right: 10px;
            bottom: 45px;
            width: 55px;
            height: 85px;
            border: 10px solid #856f54;
            border-left: none;
            border-radius: 0 50% 50% 0;
            background: transparent;
            box-shadow: 8px 8px 10px #00000033;
        }

        .saucer {
            position: absolute;
            bottom: 0px;
            left: 50px;
            width: 140px;
            height: 18px;
            background: #af8f6b;
            border-radius: 50%;
            box-shadow: 0 10px 8px #00000044;
        }

        .steam {
            position: absolute;
            top: -25px;
            left: 80px;
            width: 12px;
            height: 55px;
            background: #fff5e6cc;
            filter: blur(7px);
            border-radius: 50%;
            animation: rise 3s infinite ease-out;
        }

        .steam1 { left: 100px; animation-delay: -1s; height: 65px; }
        .steam2 { left: 120px; animation-delay: -2s; }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(-45px) scale(2); opacity: 0; }
        }

        .coffee-name {
            position: absolute;
            bottom: 45px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #442f1f;
            font-size: 22px;
            font-weight: 600;
            font-family: 'Georgia', serif;
            text-shadow: 1px 1px 2px #ecdac0;
            letter-spacing: 1.5px;
            z-index: 5;
        }

        .coffee-name span {
            background: #f3e1ccb0;
            padding: 4px 15px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
            border: 1px solid #b28054;
            box-shadow: 0 2px 6px #00000033;
        }
    </style>
</head>
<body>
    <div class="scene">
        <div class="book-container">
            <div class="book">
                <div class="cover"></div>
                <div class="cover-spine"></div>
                <div class="pages"></div>
                <div class="page-edge"></div>
                <div class="page-shadow"></div>
            </div>
        </div>

        <div class="coffee-container">
            <div class="cup">
                <div class="steam"></div>
                <div class="steam steam1"></div>
                <div class="steam steam2"></div>
                <div class="cup-body">
                    <div class="coffee-name">
                        <span>Zahraa Maitham</span>
                    </div>
                </div>
                <div class="cup-handle"></div>
                <div class="saucer"></div>
            </div>
        </div>
    </div>
</body>
</html>
